<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BrickApp - Property Management Platform">
  
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="brickapp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  
  <!-- Google Maps API with Places library and callback -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB9Fjaa-iGsyLpYem5ksiuMj9MYPi8cVMo&libraries=places,geometry&callback=initGoogleMaps" async defer></script>
  
  <script>
    // Initialize Google Maps
    window.initGoogleMaps = function() {
      console.log('✅ Google Maps API loaded with Places library');
      window.googleMapsReady = true;
      window.dispatchEvent(new Event('googleMapsLoaded'));
    };
    
    // Function to check if Google Maps is ready
    window.isGoogleMapsReady = function() {
      return typeof google !== 'undefined' && 
             google.maps && 
             google.maps.places &&
             window.googleMapsReady === true;
    };
  </script>
  
  <title>brickapp</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
